
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: #0d0d0f; color: #e8e8e8; min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .logo-icon { width: 36px; height: 36px; background: #7F77DD; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-text { font-size: 20px; font-weight: 500; color: #e8e8e8; }
  .logo-sub { font-size: 12px; color: #888; margin-left: auto; }
  .search-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #666; font-size: 18px; }
  #searchInput { width: 100%; background: #1a1a1f; border: 0.5px solid #333; border-radius: 8px; padding: 10px 12px 10px 40px; color: #e8e8e8; font-size: 15px; outline: none; transition: border-color 0.2s; }
  #searchInput:focus { border-color: #7F77DD; }
  #searchInput::placeholder { color: #555; }
  .filter-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab { background: #1a1a1f; border: 0.5px solid #2a2a30; border-radius: 20px; padding: 6px 14px; font-size: 13px; color: #aaa; cursor: pointer; transition: all 0.15s; }
  .tab.active { background: #7F77DD; border-color: #7F77DD; color: #fff; }
  .tab:hover:not(.active) { border-color: #7F77DD; color: #e8e8e8; }
  .section-label { font-size: 13px; color: #666; margin-bottom: 1rem; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .card { background: #1a1a1f; border: 0.5px solid #252528; border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
  .card:hover { border-color: #7F77DD; transform: translateY(-2px); }
  .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #111; display: block; }
  .card-img-placeholder { width: 100%; aspect-ratio: 2/3; background: #141418; display: flex; align-items: center; justify-content: center; color: #333; font-size: 32px; }
  .card-body { padding: 10px; }
  .card-title { font-size: 13px; font-weight: 500; color: #e0e0e0; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; align-items: center; gap: 6px; }
  .score { font-size: 12px; color: #FAC775; display: flex; align-items: center; gap: 3px; }
  .genre-pill { font-size: 10px; background: #252533; color: #9993ee; border-radius: 4px; padding: 2px 6px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #16161b; border: 0.5px solid #2a2a33; border-radius: 14px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 1.5rem; position: relative; }
  .modal-close { position: absolute; top: 14px; right: 14px; background: #252528; border: none; border-radius: 6px; color: #aaa; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
  .modal-close:hover { background: #333; color: #fff; }
  .modal-top { display: flex; gap: 1rem; margin-bottom: 1rem; }
  .modal-img { width: 100px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .modal-title { font-size: 17px; font-weight: 500; color: #e8e8e8; margin-bottom: 6px; line-height: 1.3; }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .modal-tag { font-size: 11px; background: #252533; color: #9993ee; border-radius: 4px; padding: 3px 8px; }
  .modal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .stat-box { background: #1a1a1f; border-radius: 8px; padding: 8px 10px; }
  .stat-label { font-size: 11px; color: #666; margin-bottom: 2px; }
  .stat-val { font-size: 15px; font-weight: 500; color: #e0e0e0; }
  .modal-synopsis-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; margin-bottom: 6px; }
  .modal-synopsis { font-size: 13px; color: #aaa; line-height: 1.7; margin-bottom: 1.25rem; }
  .watch-section { border-top: 0.5px solid #252528; padding-top: 1rem; }
  .watch-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; margin-bottom: 10px; }
  .watch-buttons { display: flex; flex-direction: column; gap: 8px; }
  .watch-btn { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; transition: opacity 0.15s, transform 0.1s; border: none; cursor: pointer; width: 100%; }
  .watch-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .watch-btn:active { transform: scale(0.98); }
  .btn-crunchyroll { background: #F47521; color: #fff; }
  .btn-netflix { background: #E50914; color: #fff; }
  .btn-youtube { background: #1a1a1f; border: 0.5px solid #333; color: #e0e0e0; }
  .btn-icon { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
  .btn-label { flex: 1; text-align: left; }
  .btn-sub { font-size: 11px; font-weight: 400; opacity: 0.8; }
  .loading { text-align: center; padding: 3rem 1rem; color: #555; font-size: 14px; }
  .loading i { font-size: 28px; display: block; margin-bottom: 10px; animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 3rem 1rem; color: #555; font-size: 14px; }
  .search-btn { background: #7F77DD; border: none; border-radius: 8px; padding: 10px 18px; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .search-btn:hover { background: #6a63c4; }
</style>

<div class="app">
  <div class="header">
    <div class="logo-icon"><i class="ti ti-device-tv" style="color:#fff;font-size:18px" aria-hidden="true"></i></div>
    <span class="logo-text">AniSearch</span>
    <span class="logo-sub">Powered by MyAnimeList</span>
  </div>

  <div class="search-row">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input id="searchInput" type="text" placeholder="Search anime titles..." autocomplete="off" />
    </div>
    <button class="search-btn" id="searchBtn"><i class="ti ti-search" aria-hidden="true"></i> Search</button>
  </div>

  <div class="filter-tabs">
    <div class="tab active" data-mode="top">Top rated</div>
    <div class="tab" data-mode="airing">Airing now</div>
    <div class="tab" data-mode="upcoming">Upcoming</div>
    <div class="tab" data-mode="popular">Most popular</div>
  </div>

  <div class="section-label" id="sectionLabel">Top rated anime</div>
  <div id="content"><div class="loading"><i class="ti ti-loader-2" aria-hidden="true"></i>Loading...</div></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose"><i class="ti ti-x" aria-hidden="true"></i></button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const API = 'https://api.jikan.moe/v4';
let currentMode = 'top';
const labels = { top: 'Top rated anime', airing: 'Currently airing', upcoming: 'Upcoming releases', popular: 'Most popular' };

function slug(title) {
  return encodeURIComponent(title.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim());
}

function watchLinks(title) {
  const q = encodeURIComponent(title);
  const s = slug(title);
  return [
    {
      cls: 'btn-crunchyroll',
      icon: '🟠',
      label: 'Watch on Crunchyroll',
      sub: 'Free with ads · Premium available',
      url: `https://www.crunchyroll.com/search?q=${q}`
    },
    {
      cls: 'btn-netflix',
      icon: '🔴',
      label: 'Search on Netflix',
      sub: 'Subscription required',
      url: `https://www.netflix.com/search?q=${q}`
    },
    {
      cls: 'btn-youtube',
      icon: '▶',
      label: 'Search on YouTube',
      sub: 'Free · Official uploads available',
      url: `https://www.youtube.com/results?search_query=${q}+anime+official`
    }
  ];
}

function scoreColor(s) {
  if (!s) return '#666';
  if (s >= 8) return '#FAC775';
  if (s >= 7) return '#9FE1CB';
  return '#aaa';
}

async function fetchAnime(mode) {
  const endpoints = { top: '/top/anime?limit=20', airing: '/top/anime?filter=airing&limit=20', upcoming: '/top/anime?filter=upcoming&limit=20', popular: '/top/anime?filter=bypopularity&limit=20' };
  const res = await fetch(API + endpoints[mode]);
  const json = await res.json();
  return json.data || [];
}

async function searchAnime(q) {
  const res = await fetch(`${API}/anime?q=${encodeURIComponent(q)}&limit=20&order_by=score&sort=desc`);
  const json = await res.json();
  return json.data || [];
}

function renderCards(list) {
  if (!list.length) return '<div class="empty">No results found.</div>';
  return `<div class="grid">${list.map(a => {
    const score = a.score ? a.score.toFixed(1) : 'N/A';
    const genre = a.genres && a.genres[0] ? a.genres[0].name : '';
    const img = a.images?.jpg?.image_url || '';
    return `<div class="card" onclick='openModal(${JSON.stringify(a).replace(/'/g,"&#39;")})'>
      ${img ? `<img class="card-img" src="${img}" alt="${a.title}" loading="lazy"/>` : `<div class="card-img-placeholder"><i class="ti ti-photo" aria-hidden="true"></i></div>`}
      <div class="card-body">
        <div class="card-title">${a.title}</div>
        <div class="card-meta">
          <span class="score" style="color:${scoreColor(a.score)}"><i class="ti ti-star-filled" style="font-size:11px" aria-hidden="true"></i>${score}</span>
          ${genre ? `<span class="genre-pill">${genre}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function openModal(a) {
  const score = a.score ? a.score.toFixed(1) : 'N/A';
  const img = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
  const genres = (a.genres || []).map(g => `<span class="modal-tag">${g.name}</span>`).join('');
  const synopsis = a.synopsis ? a.synopsis.replace('[Written by MAL Rewrite]','').trim() : 'No synopsis available.';
  const eps = a.episodes || '?';
  const year = a.year || (a.aired?.prop?.from?.year) || '?';
  const status = a.status || '?';
  const type = a.type || '?';
  const links = watchLinks(a.title_english || a.title);

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-top">
      ${img ? `<img class="modal-img" src="${img}" alt="${a.title}"/>` : ''}
      <div class="modal-info">
        <div class="modal-title">${a.title}</div>
        ${a.title_english && a.title_english !== a.title ? `<div style="font-size:12px;color:#666;margin-bottom:6px">${a.title_english}</div>` : ''}
        <div class="modal-tags">${genres}</div>
        <div style="display:flex;gap:10px;font-size:13px;color:#aaa">
          <span><i class="ti ti-star" style="color:#FAC775;font-size:14px;vertical-align:-2px" aria-hidden="true"></i> ${score}</span>
          <span><i class="ti ti-calendar" style="font-size:14px;vertical-align:-2px" aria-hidden="true"></i> ${year}</span>
        </div>
      </div>
    </div>
    <div class="modal-stats">
      <div class="stat-box"><div class="stat-label">Type</div><div class="stat-val">${type}</div></div>
      <div class="stat-box"><div class="stat-label">Episodes</div><div class="stat-val">${eps}</div></div>
      <div class="stat-box"><div class="stat-label">Status</div><div class="stat-val">${status}</div></div>
      <div class="stat-box"><div class="stat-label">Ranked</div><div class="stat-val">${a.rank ? '#' + a.rank : 'N/A'}</div></div>
    </div>
    <div class="modal-synopsis-label">Synopsis</div>
    <div class="modal-synopsis">${synopsis}</div>
    <div class="watch-section">
      <div class="watch-label">Where to watch</div>
      <div class="watch-buttons">
        ${links.map(l => `
          <a href="${l.url}" target="_blank" class="watch-btn ${l.cls}">
            <span class="btn-icon">${l.icon}</span>
            <span class="btn-label">${l.label}<br><span class="btn-sub">${l.sub}</span></span>
            <i class="ti ti-external-link" style="font-size:14px;opacity:0.7" aria-hidden="true"></i>
          </a>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

async function load(mode) {
  document.getElementById('content').innerHTML = '<div class="loading"><i class="ti ti-loader-2" aria-hidden="true"></i>Loading...</div>';
  document.getElementById('sectionLabel').textContent = labels[mode];
  try {
    const data = await fetchAnime(mode);
    document.getElementById('content').innerHTML = renderCards(data);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">Failed to load. Please try again.</div>';
  }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { load(currentMode); return; }
  document.getElementById('content').innerHTML = '<div class="loading"><i class="ti ti-loader-2" aria-hidden="true"></i>Searching...</div>';
  document.getElementById('sectionLabel').textContent = `Results for "${q}"`;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  try {
    const data = await searchAnime(q);
    document.getElementById('content').innerHTML = renderCards(data);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">Search failed. Please try again.</div>';
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.getElementById('searchInput').value = '';
    load(currentMode);
  });
});

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); });

load('top');
</script>
